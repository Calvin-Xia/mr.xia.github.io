<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="storage/icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <link rel="preload" href="css/style.css" as="style">
    <meta name="description" content="Mr.Xia个人网站文章">
    <title>文章 - Mr.Xia</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <a class="skip-link" href="#main-content">跳到主要内容</a>
    <!-- 动态背景 -->
    <div class="bg-img"></div>

    <!-- 页眉导航 -->
    <header>
        <nav aria-label="主导航">
            <div class="logo">Mr.Xia</div>
            <ul class="nav-links" role="menubar">
                <li role="none"><a href="index.html" data-history="true" data-title="首页" role="menuitem">首页</a></li>
                <li role="none"><a href="Works.html" data-history="true" data-title="作品" role="menuitem">作品</a></li>
                <li role="none"><a href="timetable.html" data-history="true" data-title="工具" role="menuitem">工具</a></li>
                <li role="none"><a href="statement.html" data-history="true" data-title="文章" aria-current="page" role="menuitem">文章</a></li>
                <li role="none"><a href="about.html" data-history="true" data-title="关于" role="menuitem">关于</a></li>
            </ul>
        </nav>
    </header>

    <!-- 主内容 -->
    <main id="main-content" class="site-main" tabindex="-1">
        <section class="page-intro page-intro--compact articles-intro">
            <p class="section-kicker">内容索引</p>
            <h1>博客文章</h1>
            <p class="page-subtitle text-small">
                记录生活，分享思考
            </p>
            <div class="search-container">
                <div class="search-box">
                    <input 
                        type="text" 
                        id="search-input" 
                        placeholder="搜索文章标题、内容或标签..." 
                        autocomplete="off"
                        aria-label="搜索文章"
                        aria-describedby="search-hint"
                        aria-controls="search-suggestions"
                        aria-autocomplete="list"
                        aria-expanded="false"
                    >
                    <button id="search-btn" class="search-btn" aria-label="搜索">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </button>
                </div>
                <p id="search-hint" class="text-small search-hint">输入关键词搜索文章标题、内容或标签</p>
                <div id="search-suggestions" class="search-suggestions" role="listbox" aria-label="搜索建议"></div>
            </div>
        </section>

        <!-- 分类和标签导航 -->
        <div class="filter-nav">
            <div class="filter-section">
                <h3>分类</h3>
                <div id="category-filters" class="filter-tags">
                    <button class="filter-tag active" data-filter="all" data-type="category" aria-pressed="true">全部</button>
                </div>
            </div>
            <div class="filter-section">
                <h3>标签</h3>
                <div id="tag-filters" class="filter-tags">
                    <button class="filter-tag active" data-filter="all" data-type="tag" aria-pressed="true">全部</button>
                </div>
            </div>
        </div>

        <!-- 博客文章列表 -->
        <div id="blog-container" aria-live="polite" aria-label="博客文章列表">
            <div class="loading-indicator">加载中...</div>
        </div>

        <!-- 返回首页 -->
        <div class="page-return">
            <a href="index.html" class="btn btn-secondary" data-history="true" data-title="首页">
                ← 返回首页
            </a>
        </div>
        
        <!-- 页脚 -->
        <div class="site-footer">
            <p class="footer-text">
                <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">渝ICP备2026000319号</a>
                <br>
                <a href="https://beian.mps.gov.cn/#/query/webSearch?code=50010102001439" class="record-link" rel="noreferrer" target="_blank">
                    <img src="storage/Beian.png" alt="公安备案" class="record-icon" loading="lazy">
                    渝公网安备50010102001439号
                </a>
            </p>
        </div>
    </main>

    <!-- JavaScript -->
    <script src="js/main.js"></script>
    <script>
        (function() {
            const Search = {
                articles: [],
                searchInput: null,
                searchSuggestions: null,
                searchBtn: null,
                debounceTimer: null,
                selectedIndex: -1,

                init() {
                    this.searchInput = document.getElementById('search-input');
                    this.searchSuggestions = document.getElementById('search-suggestions');
                    this.searchBtn = document.getElementById('search-btn');

                    if (!this.searchInput || !this.searchSuggestions || !this.searchBtn) {
                        console.error('Search elements not found');
                        return;
                    }

                    this.searchInput.addEventListener('input', (e) => this.handleInput(e));
                    this.searchBtn.addEventListener('click', () => this.performSearch());
                    this.searchInput.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') {
                            this.performSearch();
                        }
                    });
                    this.searchInput.addEventListener('keydown', (e) => this.handleKeydown(e));

                    document.addEventListener('click', (e) => {
                        if (!this.searchInput.contains(e.target) && !this.searchSuggestions.contains(e.target)) {
                            this.hideSuggestions();
                        }
                    });
                },

                setArticles(articles) {
                    this.articles = articles;
                },

                handleInput(e) {
                    clearTimeout(this.debounceTimer);
                    const query = e.target.value.trim();

                    if (query.length === 0) {
                        this.hideSuggestions();
                        BlogLoader.renderArticles(this.articles, document.getElementById('blog-container'));
                        return;
                    }

                    this.debounceTimer = setTimeout(() => {
                        this.showSuggestions(query);
                    }, 300);
                },

                showSuggestions(query) {
                    const suggestions = this.findSuggestions(query);
                    
                    if (suggestions.length === 0) {
                        this.hideSuggestions();
                        return;
                    }

                    this.searchSuggestions.innerHTML = suggestions.map(article => `
                        <div class="suggestion-item" id="suggestion-${article.id}" data-id="${article.id}" role="option">
                            <div class="suggestion-title">${this.highlightMatch(article.title, query)}</div>
                            <div class="suggestion-meta">${article.category} · ${article.date}</div>
                        </div>
                    `).join('');

                    this.searchSuggestions.classList.add('active');
                    this.searchInput.setAttribute('aria-expanded', 'true');

                    this.searchSuggestions.querySelectorAll('.suggestion-item').forEach(item => {
                        item.addEventListener('click', () => {
                            const articleId = item.dataset.id;
                            const article = this.articles.find(a => a.id === articleId);
                            if (article) {
                                window.location.href = article.filePath;
                            }
                        });
                    });
                },

                hideSuggestions() {
                    this.searchSuggestions.classList.remove('active');
                    this.selectedIndex = -1;
                    this.searchInput.setAttribute('aria-expanded', 'false');
                    this.searchInput.removeAttribute('aria-activedescendant');
                },

                handleKeydown(e) {
                    const items = this.searchSuggestions.querySelectorAll('.suggestion-item');
                    if (items.length === 0 || !this.searchSuggestions.classList.contains('active')) {
                        return;
                    }

                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        this.selectedIndex = Math.min(this.selectedIndex + 1, items.length - 1);
                        this.updateSelection(items);
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        this.selectedIndex = Math.max(this.selectedIndex - 1, 0);
                        this.updateSelection(items);
                    } else if (e.key === 'Enter' && this.selectedIndex >= 0) {
                        e.preventDefault();
                        items[this.selectedIndex].click();
                    } else if (e.key === 'Escape') {
                        this.hideSuggestions();
                    }
                },

                updateSelection(items) {
                    items.forEach((item, index) => {
                        if (index === this.selectedIndex) {
                            item.classList.add('is-selected');
                            item.setAttribute('aria-selected', 'true');
                            this.searchInput.setAttribute('aria-activedescendant', item.id);
                        } else {
                            item.classList.remove('is-selected');
                            item.setAttribute('aria-selected', 'false');
                        }
                    });
                },

                findSuggestions(query) {
                    const lowerQuery = query.toLowerCase();
                    return this.articles.filter(article => 
                        article.title.toLowerCase().includes(lowerQuery) ||
                        article.tags.some(tag => tag.toLowerCase().includes(lowerQuery))
                    ).slice(0, 5);
                },

                highlightMatch(text, query) {
                    const regex = new RegExp(`(${query})`, 'gi');
                    return text.replace(regex, '<mark class="search-highlight">$1</mark>');
                },

                performSearch() {
                    const query = this.searchInput.value.trim().toLowerCase();
                    this.hideSuggestions();

                    if (query.length === 0) {
                        BlogLoader.renderArticles(this.articles, document.getElementById('blog-container'));
                        return;
                    }

                    const results = this.articles.filter(article => 
                        article.title.toLowerCase().includes(query) ||
                        article.excerpt.toLowerCase().includes(query) ||
                        article.tags.some(tag => tag.toLowerCase().includes(query)) ||
                        article.category.toLowerCase().includes(query)
                    );

                    BlogLoader.renderArticles(results, document.getElementById('blog-container'));
                }
            };

            const BlogLoader = {
                articles: [],
                currentCategory: 'all',
                currentTag: 'all',
                retryCount: 0,
                maxRetries: 3,

                async init() {
                    const container = document.getElementById('blog-container');
                    if (!container) {
                        return;
                    }

                    try {
                        const articles = await this.loadAllArticles();
                        this.articles = articles;
                        Search.setArticles(articles);
                        this.renderFilters();
                        this.renderArticles(articles, container);
                    } catch (err) {
                        this.renderError(container, err);
                    }
                },

                renderError(container, err) {
                    container.innerHTML = `
                            <div class="no-results">
                                <div class="no-results-icon">⚠️</div>
                                <p>文章加载失败</p>
                                <p class="text-small">请检查网络连接后重试</p>
                                <button class="btn btn-outline retry-btn" id="retry-btn">
                                    重新加载
                                </button>
                            </div>
                    `;
                    const retryBtn = document.getElementById('retry-btn');
                    if (retryBtn) {
                        retryBtn.addEventListener('click', () => this.retry());
                    }
                },

                async retry() {
                    this.retryCount = 0;
                    const container = document.getElementById('blog-container');
                    container.innerHTML = '<div class="loading-indicator">加载中...</div>';
                    await this.init();
                },

                async loadAllArticles() {
                    const metadata = await this.loadMetadata();
                    if (!metadata || metadata.length === 0) {
                        return [];
                    }

                    return metadata;
                },

                async loadMetadata() {
                    const attemptFetch = async (retryAttempt = 0) => {
                        try {
                            const response = await fetch('blog/blog-metadata.json');
                            if (!response.ok) {
                                throw new Error(`HTTP error! status: ${response.status}`);
                            }
                            const metadata = await response.json();
                            return metadata;
                        } catch (err) {
                            if (retryAttempt < this.maxRetries) {
                                await new Promise(resolve => setTimeout(resolve, 1000 * (retryAttempt + 1)));
                                return attemptFetch(retryAttempt + 1);
                            }
                            throw err;
                        }
                    };
                    
                    return attemptFetch();
                },

                renderFilters() {
                    const categories = new Set(this.articles.map(a => a.category));
                    const tags = new Set(this.articles.flatMap(a => a.tags));

                    const categoryContainer = document.getElementById('category-filters');
                    const tagContainer = document.getElementById('tag-filters');

                    if (categoryContainer) {
                        categoryContainer.innerHTML = '<button class="filter-tag active" data-filter="all" data-type="category" aria-pressed="true">全部</button>';
                        categories.forEach(category => {
                            const btn = document.createElement('button');
                            btn.className = 'filter-tag';
                            btn.dataset.filter = category;
                            btn.dataset.type = 'category';
                            btn.textContent = category;
                            btn.setAttribute('aria-pressed', 'false');
                            categoryContainer.appendChild(btn);
                        });

                        categoryContainer.querySelectorAll('.filter-tag').forEach(btn => {
                            btn.addEventListener('click', (e) => this.handleFilterClick(e));
                        });
                    }

                    if (tagContainer) {
                        tagContainer.innerHTML = '<button class="filter-tag active" data-filter="all" data-type="tag" aria-pressed="true">全部</button>';
                        tags.forEach(tag => {
                            const btn = document.createElement('button');
                            btn.className = 'filter-tag';
                            btn.dataset.filter = tag;
                            btn.dataset.type = 'tag';
                            btn.textContent = tag;
                            btn.setAttribute('aria-pressed', 'false');
                            tagContainer.appendChild(btn);
                        });

                        tagContainer.querySelectorAll('.filter-tag').forEach(btn => {
                            btn.addEventListener('click', (e) => this.handleFilterClick(e));
                        });
                    }
                },

                handleFilterClick(e) {
                    const filter = e.target.dataset.filter;
                    const type = e.target.dataset.type;

                    const container = type === 'category' ? document.getElementById('category-filters') : document.getElementById('tag-filters');
                    container.querySelectorAll('.filter-tag').forEach(btn => {
                        btn.classList.remove('active');
                        btn.setAttribute('aria-pressed', 'false');
                    });
                    e.target.classList.add('active');
                    e.target.setAttribute('aria-pressed', 'true');

                    if (type === 'category') {
                        this.currentCategory = filter;
                    } else {
                        this.currentTag = filter;
                    }

                    this.applyFilters();
                },

                applyFilters() {
                    let filtered = this.articles;

                    if (this.currentCategory !== 'all') {
                        filtered = filtered.filter(a => a.category === this.currentCategory);
                    }

                    if (this.currentTag !== 'all') {
                        filtered = filtered.filter(a => a.tags.includes(this.currentTag));
                    }

                    this.renderArticles(filtered, document.getElementById('blog-container'));
                },

                renderArticles(articles, container) {
                    if (articles.length === 0) {
                        container.innerHTML = `
                            <div class="no-results">
                                <div class="no-results-icon">🔍</div>
                                <p>没有找到相关文章</p>
                                <p class="text-small">试试其他关键词或筛选条件</p>
                            </div>
                        `;
                        return;
                    }

                    container.innerHTML = '';

                    articles.forEach(article => {
                        const articleCard = this.createArticleCard(article);
                        container.appendChild(articleCard);
                    });
                },

                createArticleCard(article) {
                    const card = document.createElement('div');
                    card.className = 'blog-card';

                    const link = document.createElement('a');
                    link.href = article.filePath;
                    link.className = 'blog-card-link';

                    const title = document.createElement('h2');
                    title.className = 'blog-card-title';
                    title.textContent = article.title;

                    const excerpt = document.createElement('p');
                    excerpt.className = 'blog-card-excerpt';
                    excerpt.textContent = article.excerpt;

                    const meta = document.createElement('div');
                    meta.className = 'blog-card-meta';

                    const category = document.createElement('span');
                    category.className = 'blog-card-category';
                    category.textContent = article.category;

                    meta.appendChild(category);

                    article.tags.forEach(tag => {
                        const tagSpan = document.createElement('span');
                        tagSpan.className = 'blog-card-tag';
                        tagSpan.textContent = tag;
                        meta.appendChild(tagSpan);
                    });

                    link.appendChild(title);
                    link.appendChild(excerpt);
                    card.appendChild(link);
                    card.appendChild(meta);

                    if (article.date) {
                        const dateElement = document.createElement('div');
                        dateElement.className = 'blog-card-date';
                        dateElement.textContent = article.date;
                        card.appendChild(dateElement);
                    }

                    return card;
                }
            };

            window.addEventListener('load', () => {
                Search.init();
                BlogLoader.init();
            });
        })();
    </script>
    <script src="js/navigation.js"></script>
    
    <!-- 页面过渡指示器 -->
    <div id="page-transition-indicator" aria-hidden="true" aria-busy="false">
        <div class="spinner" role="status" aria-label="页面加载中"></div>
    </div>
</body>
</html>
