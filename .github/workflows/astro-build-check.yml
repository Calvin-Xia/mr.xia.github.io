name: Astro Build Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  astro-build-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Verify static output
        run: |
          test -f dist/index.html
          test -f dist/_headers
          node -e "const fs = require('fs'); const html = fs.readFileSync('dist/index.html', 'utf8'); if (!html.includes('欢迎来到 Mr.Xia 的小站')) { throw new Error('dist/index.html is missing the home page title'); }"
          node -e "const fs = require('fs'); const headers = fs.readFileSync('dist/_headers', 'utf8'); if (!headers.includes('X-Content-Type-Options: nosniff')) { throw new Error('dist/_headers is missing security headers'); }"
